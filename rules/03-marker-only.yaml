- required_engine_version: 0.40.0

- rule: Unique custom marker process
  desc: Test rule that fires when a process named 'falcomarker' is executed in any container.
  condition: >
    evt.type = execve
    and container.id != host
    and proc.name = "falcomarker"
  output: >
    Unique custom rule fired (proc=%proc.name cmd=%proc.cmdline
    container=%container.name pod=%k8s.pod.name ns=%k8s.ns.name)
  priority: CRITICAL
  tags: [custom, test]
