- required_engine_version: 0.40.0

- rule: Unique custom marker process
  desc: Test rule that fires when a process named 'falcomarker' is executed in any container.
  condition: >
    evt.type = execve
    and container.id != host
    and proc.name = "falcomarker"
  output: >
    Unique custom rule v4 fired (proc=%proc.name cmd=%proc.cmdline
    container=%container.name pod=%k8s.pod.name ns=%k8s.ns.name)
  priority: CRITICAL
  tags: [custom, test, v4]

- rule: Hot reload sentinel
  desc: Fires when 'hotreload-sentinel' process is executed. Only present in v4 onward.
  condition: >
    evt.type = execve
    and container.id != host
    and proc.name = "hotreload-sentinel"
  output: >
    Hot reload sentinel detected (proc=%proc.name pod=%k8s.pod.name ns=%k8s.ns.name)
  priority: WARNING
  tags: [custom, test, v4, hotreload]
