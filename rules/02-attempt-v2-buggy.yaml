- required_engine_version: 0.40.0

- rule: Reverse shell via netcat -e
  desc: >
    Detect classic netcat reverse shell pattern (nc -e /bin/sh ATTACKER PORT)
    spawned inside a container.
  condition: >
    evt.type = execve
    and container.id != host
    and proc.name in (nc, ncat, netcat)
    and (proc.cmdline contains "-e " or proc.cmdline contains " -c ")
  output: >
    Reverse shell via netcat in container
    (user=%user.name command=%proc.cmdline container=%container.name
    pod=%k8s.pod.name ns=%k8s.ns.name)
  priority: CRITICAL
  tags: [network, mitre_execution, T1059]

- rule: Curl pipeline to shell
  desc: >
    Detect 'curl ... | sh' or 'wget ... | bash' patterns where a shell is
    spawned as a child of curl or wget inside a container.
  condition: >
    evt.type = execve
    and container.id != host
    and proc.name in (sh, bash, dash, ash, ksh, zsh)
    and proc.pname in (curl, wget)
  output: >
    Shell spawned by curl/wget pipeline in container
    (user=%user.name parent=%proc.pname command=%proc.cmdline
    container=%container.name pod=%k8s.pod.name ns=%k8s.ns.name)
  priority: WARNING
  tags: [process, mitre_command_and_control, T1105]
