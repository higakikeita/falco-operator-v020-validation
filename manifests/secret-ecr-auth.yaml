# Opaque Secret for ECR auth used by Rulesfile/Plugin CRD `registry.auth.secretRef`.
#
# IMPORTANT (Finding #8): artifact-operator v0.2.0 expects an Opaque secret with
# `username`/`password` keys, NOT the standard `kubernetes.io/dockerconfigjson` format.
#
# IMPORTANT (Finding #10): ECR tokens expire every 12 hours — rotate this secret on a schedule.
#
# Create via:
#   ECR_TOKEN=$(aws ecr get-login-password --region <REGION>)
#   kubectl create secret generic ecr-auth -n falco \
#     --from-literal=username=AWS \
#     --from-literal=password="$ECR_TOKEN"
apiVersion: v1
kind: Secret
metadata:
  name: ecr-auth
  namespace: falco
type: Opaque
stringData:
  username: AWS
  password: <ECR_AUTHORIZATION_TOKEN>
