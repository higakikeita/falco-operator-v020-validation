# RBAC grant: Falco SA (used by the artifact-operator sidecar) needs to read Secrets
# in the `falco` namespace to resolve `registry.auth.secretRef` references on Rulesfile/Plugin CRDs.
#
# IMPORTANT (Finding #7): the default install.yaml does NOT include this Role/RoleBinding,
# so private OCI registry auth fails out-of-the-box with:
#   "secrets is forbidden: User \"system:serviceaccount:falco:falco\" cannot list resource \"secrets\""
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: falco-secrets-reader
  namespace: falco
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: falco-secrets-reader
  namespace: falco
subjects:
  - kind: ServiceAccount
    name: falco
    namespace: falco
roleRef:
  kind: Role
  name: falco-secrets-reader
  apiGroup: rbac.authorization.k8s.io
