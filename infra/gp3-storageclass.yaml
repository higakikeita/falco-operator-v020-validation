# Default StorageClass for the EBS CSI driver. Without this (or with the legacy `gp2`
# in-tree StorageClass set as default), the Redis StatefulSet shipped by the Falco Operator
# Quickstart will sit in `Pending` forever with "pod has unbound immediate PersistentVolumeClaims".
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp3
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: ebs.csi.aws.com
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
parameters:
  type: gp3
  encrypted: "true"
